b = 19
[segments.styles]
text_bold = false
[segments.options]

# ── 5. 输出样式 — 红瞳红（体系人格的脸·莉莉） ──
[[segments]]
id = "output_style"
enabled = true
[segments.icon]
plain = "🎯"
nerd_font = "󱋵"
[segments.colors.icon]
